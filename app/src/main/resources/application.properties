# Server Configuration
server.servlet.context-path=/hello-world-spring-boot-sample-app
server.port=8080

# Application Info
spring.application.name=hello-world-spring-boot-sample-app

# Actuator Configuration for Prometheus metrics
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true

# Micrometer OpenTelemetry Configuration
management.tracing.sampling.probability=1.0

# OpenTelemetry Trace Exporter Configuration
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.jaeger.endpoint=http://localhost:14250
otel.exporter.jaeger.batch.export.timeout=30000

# Alternative: Use Thrift endpoint for Jaeger
# otel.traces.exporter=jaeger_thrift
# otel.exporter.jaeger.endpoint=http://localhost:6831

# OTLP Protocol for traces (default)
otel.traces.exporter=otlp
otel.metrics.exporter=otlp
otel.logs.exporter=otlp

# Service Configuration
otel.service.name=hello-world-spring-boot-sample-app
otel.resource.attributes=deployment.environment=SANDBOX,service.name=hello-world-spring-boot-sample-app,service.version=1.0.0

# Jaeger Configuration via environment variables
# Can be overridden by env vars:
# OTEL_EXPORTER_JAEGER_AGENT_HOST=localhost
# OTEL_EXPORTER_JAEGER_AGENT_PORT=6831

# Prometheus Metrics Configuration
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=SANDBOX

# Logging Configuration
logging.level.root=INFO
logging.level.com.example.helloworld=DEBUG
logging.level.io.opentelemetry=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
