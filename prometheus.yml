global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: SANDBOX
    service: hello-world-spring-boot-sample-app

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Scrape metrics from the application
  - job_name: 'hello-world-app'
    static_configs:
      - targets: ['tomcat:8080']
    metrics_path: '/hello-world-spring-boot-sample-app/actuator/prometheus'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Scrape metrics from OpenTelemetry Prometheus exporter
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Prometheus itself metrics
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
