services:
  # Jaeger All-in-One for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: otel-jaeger
    ports:
      - "6831:6831/udp"  # Jaeger agent compact thrift
      - "14250:14250"    # Jaeger gRPC receiver
      - "14268:14268"    # Jaeger HTTP receiver
      - "16686:16686"    # Jaeger UI
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - COLLECTOR_OTLP_HOST_PORT=:4317
    networks:
      - otel-network

  # OTEL Collector (Optional but recommended for production)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    ports:
      - "4317:4317"      # OTLP gRPC receiver
      - "4318:4318"      # OTLP HTTP receiver
      - "9411:9411"      # Zipkin receiver
      - "8888:8888"      # Prometheus metrics
      - "8889:8889"      # Prometheus exporter
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml
    networks:
      - otel-network
    depends_on:
      - jaeger

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - otel-network
    depends_on:
      - otel-collector

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana-provisioning:/etc/grafana/provisioning
    networks:
      - otel-network
    depends_on:
      - prometheus

  # Apache Tomcat with our Spring Boot WAR application
  tomcat:
    build:
      context: .
      dockerfile: Dockerfile
    image: tomcat-otel-app:latest
    container_name: tomcat-app
    ports:
      - "8080:8080"
      - "8000:8000"  # Remote debugging port (optional)
    environment:
      - CATALINA_OPTS=-Xmx512m -Xms256m -Dotel.javaagent.debug=false -javaagent:/usr/local/tomcat/opentelemetry-javaagent.jar -Dotel.service.name=hello-world-spring-boot-sample-app
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_JAEGER_ENDPOINT=http://jaeger:14250
      - OTEL_SERVICE_NAME=hello-world-spring-boot-sample-app
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment=SANDBOX,service.name=hello-world-spring-boot-sample-app,service.version=1.0.0
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_TIMEOUT=30000
    volumes:
      - ./app/target/hello-world-spring-boot-sample-app-1.0.0.war:/usr/local/tomcat/webapps/hello-world-spring-boot-sample-app.war
    networks:
      - otel-network
    depends_on:
      - jaeger
      - otel-collector
      - prometheus
      - grafana

networks:
  otel-network:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
